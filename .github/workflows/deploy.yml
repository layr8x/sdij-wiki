name: Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    name: Build & Verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Run linting
        run: npm run lint

      - name: Build project
        run: npm run build
        env:
          VITE_CONFLUENCE_EMAIL: ${{ secrets.VITE_CONFLUENCE_EMAIL }}
          VITE_CONFLUENCE_TOKEN: ${{ secrets.VITE_CONFLUENCE_TOKEN }}
          VITE_ENV: production
          VITE_API_BASE_URL: https://sdij-wiki.vercel.app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Vercel 배포는 Vercel Git Integration(layr8xs-projects/ams-wiki)이 자동으로 처리하므로
  # 중복 deploy job 은 제거 (vercel/action@main 리포지토리 미존재로 항상 실패)
