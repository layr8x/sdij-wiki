name: Setup Custom Domain

on:
  workflow_dispatch:

jobs:
  setup-domain:
    runs-on: ubuntu-latest
    name: Configure Vercel Domain

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Custom Domain to Vercel
        id: add-domain
        run: |
          DOMAIN="sdij-wiki.vercel.app"
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/domains" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${DOMAIN}\"}")

          echo "Response: $RESPONSE"
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Verify Domain Setup
        run: |
          DOMAIN="sdij-wiki.vercel.app"
          curl -s -X GET "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/domains?domain=${DOMAIN}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | jq '.'

      - name: Update documentation
        run: |
          DOMAIN="sdij-wiki.vercel.app"
          sed -i "s|https://.*\.vercel\.app|https://${DOMAIN}|g" README.md
          sed -i "s|http://.*\.vercel\.app|https://${DOMAIN}|g" README.md

      - name: Commit and push updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if git diff --quiet README.md; then
            echo "No changes to commit"
          else
            git add README.md
            git commit -m "chore: Update deployment domain to sdij-wiki.vercel.app"
            git push origin main || true
          fi

